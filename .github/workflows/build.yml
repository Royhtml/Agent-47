name: Agent47 Build and Release

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller -r requirements.txt  # Ganti dengan library GUI Anda (PyQt/CustomTkinter)

    - name: Build Application
      run: |
        pyinstaller --onedir --windowed main.py  # --windowed untuk menyembunyikan konsol hitam GUI

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GUI-App-${{ matrix.os }}
        path: dist/
